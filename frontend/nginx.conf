server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (matches docker-compose service name).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Local/self-hosted model backends (e.g. Ollama on CPU) can take minutes for the
        # multi-agent pipeline (planner -> SQL gen -> validator -> aggregator); nginx's
        # 60s default read timeout otherwise 504s the request mid-stream.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # /api/ask/stream is SSE - disable buffering so trace events flush immediately.
        proxy_buffering off;
    }

    # SPA fallback: any unknown path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable caching for hashed static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
