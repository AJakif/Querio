services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: querio
      POSTGRES_PASSWORD: querio
      POSTGRES_DB: querio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querio -d querio"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://querio:querio@postgres:5432/querio
    command: python scripts/load_raw.py

  dbt:
    build:
      context: backend
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      DBT_HOST: postgres
      DBT_PORT: "5432"
      DBT_USER: querio
      DBT_PASSWORD: querio
      DBT_DBNAME: querio
    working_dir: /dbt
    volumes:
      - ./dbt:/dbt
    command: >
      sh -c "
        pip install dbt-postgres -q &&
        dbt deps &&
        dbt run
      "

  airflow:
    image: apache/airflow:2.10.5-python3.12
    depends_on:
      postgres:
        condition: service_healthy
      dbt:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql://querio:querio@postgres:5432/querio
      _PIP_ADDITIONAL_REQUIREMENTS: psycopg2-binary dbt-postgres
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./backend:/opt/querio/backend
      - ./dbt:/opt/querio/dbt
      - airflow_home:/opt/airflow
    ports:
      - "8081:8080"
    command: standalone
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: backend
    depends_on:
      dbt:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://querio:querio@postgres:5432/querio
      DB_SCHEMA: marts
      MODEL_NAME: ${MODEL_NAME:-openai:gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
  airflow_home:
